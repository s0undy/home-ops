---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.100.10:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.0.100.10"
  - "talos.josefssonit.se"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "jit-talos-01"
    ipAddress: "10.0.100.11"
    installDisk: "/dev/disk/by-path/pci-0000:09:01.0-scsi-0:0:0:0"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/74e275aacf4a5cf6c59cff672138e960790bc5f7e65de3f4a14c7d6e87249294
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "a2:19:97:5d:65:63"
        dhcp: false
        addresses:
          - "10.0.100.11/24"
        routes:
          - gateway: "10.0.100.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.0.100.10"
      - deviceSelector:
          hardwareAddr: "a2:19:97:a0:6f:1c"
        dhcp: false
        addresses:
          - "172.16.52.21/24"
        mtu: 9000
      - deviceSelector:
          hardwareAddr: "a2:19:97:cc:32:5f"
        dhcp: false
        addresses:
          - "172.16.60.21/24"
        mtu: 9000
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ice-firmware
            - siderolabs/intel-ucode
            - siderolabs/mei
            - siderolabs/xe
            - siderolabs/qemu-guest-agent


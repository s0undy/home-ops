---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: postgres
  namespace: default
spec:
  retentionPolicy: 30d
  instanceSidecarConfiguration:
    resources:
      limits:
        memory: 512Mi
        cpu: 1
      requests:
        memory: 128Mi
        cpu: 10m
  configuration:
    destinationPath: s3://postgresql/
    endpointURL: https://horrea-10.josefssonit.se:30292
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: S3_ACCESS_KEY
      secretAccessKey:
        name: cloudnative-pg-secret
        key: S3_SECRET_KEY
    wal:
      compression: zstd
    data:
      compression: gzip
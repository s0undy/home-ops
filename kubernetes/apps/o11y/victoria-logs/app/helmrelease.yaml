---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    global:
      image:
        registry: quay.io
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
    server:
      fullnameOverride: victoria-logs
      persistentVolume:
        enabled: true
        storageClassName: ceph-rbd
        size: 50Gi
      retentionPeriod: 90d
      route:
        enabled: true
        hostnames:
          - "vlogs.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
      serviceMonitor:
        enabled: true
